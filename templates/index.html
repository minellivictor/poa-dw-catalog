{% extends "_base.html" %}

{% block title %}Início | POA DW Catalog{% endblock %}

{% block content %}
<section class="page-card p-4 p-md-5 mx-auto" style="max-width: 820px;">
  <div class="mb-4 text-center text-md-start">
    <h2 class="hero-title fw-bold mb-2">Catálogo de Metadados do DW</h2>
    <p class="text-secondary mb-0">Busque por tabelas e colunas nas camadas bronze, silver e gold.</p>
  </div>

  <form action="/search" method="get" class="row g-3 align-items-end">
    <div class="col-12">
      <label for="q" class="form-label fw-semibold">Buscar tabela ou coluna</label>
      <input id="q" type="search" name="q" class="form-control form-control-lg search-input-lg" placeholder="Ex.: cliente, pedido, valor_total" aria-label="Buscar tabela ou coluna" required>
    </div>

    <div class="col-12 col-md-4">
      <label for="layer" class="form-label">Camada</label>
      <select id="layer" name="layer" class="form-select" aria-label="Filtrar camada">
        <option value="all" selected>Todas</option>
        <option value="bronze">bronze</option>
        <option value="silver">silver</option>
        <option value="gold">gold</option>
      </select>
    </div>

    <div class="col-12 col-md-4">
      <label for="scope" class="form-label">Escopo</label>
      <select id="scope" name="scope" class="form-select" aria-label="Escopo">
        <option value="all">Tudo</option>
        <option value="tables">Apenas tabelas</option>
        <option value="columns">Apenas colunas</option>
      </select>
    </div>

    <div class="col-12 col-md-4 d-grid">
      <button type="submit" class="btn btn-primary btn-lg">Buscar</button>
    </div>
  </form>
</section>
{% endblock %}
