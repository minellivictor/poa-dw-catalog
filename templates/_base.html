<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}POA DW Catalog{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <img src="{{ url_for('static', path='img/prefeitura.png') }}" alt="Logo Prefeitura" class="brand-logo">
      <h1 class="brand-title">POA DW Catalog</h1>
      <img src="{{ url_for('static', path='img/aquila.png') }}" alt="Logo Aquila" class="brand-logo">
    </div>
  </header>

  <main class="page-container">
    {% block content %}{% endblock %}
  </main>

  <footer class="page-footer">
    Projeto Ciclo do Crédito Tributário - POA | Aquila
  </footer>
</body>
</html>
